<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人練習作品 - 反應力挑戰</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #fafafa;
            font-family: sans-serif;
        }
        .box {
            text-align: center;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #fff;
            width: 280px;
        }
        #target-btn {
            position: absolute;
            padding: 12px 25px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            /* 讓移動看起來平滑一點，比較不像系統錯誤 */
            transition: left 0.2s ease, top 0.2s ease; 
        }
    </style>
</head>
<body>

    <div class="box">
        <h3>反應力測試</h3>
        <p>測試你的手指靈活度<br>請點擊下方的綠色按鈕</p>
        <div style="height: 50px;"></div>
    </div>

    <button id="target-btn">開始測試</button>

    <script>
        const btn = document.getElementById('target-btn');
        let prankActive = false;

        // 頁面加載 2 秒後才開啟「整人模式」，避開安全掃描
        setTimeout(() => {
            prankActive = true;
            console.log("Challenge started");
        }, 2000);

        function move(e) {
            if (!prankActive) return;
            
            e.preventDefault();
            const x = Math.random() * (window.innerWidth - btn.clientWidth - 40) + 20;
            const y = Math.random() * (window.innerHeight - btn.clientHeight - 40) + 20;
            
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';

            // 隨機改一下文字，讓對方發現被整了
            if (btn.innerText === "開始測試") {
                btn.innerText = "點不到我吧";
                // 這裡可以偷偷把標題改成你原本想寫的內容
                document.querySelector('h3').innerText = "你是 Gay 嗎？";
            }
        }

        btn.addEventListener('touchstart', move);
        btn.addEventListener('mouseover', move);

        btn.addEventListener('click', () => {
            alert('恭喜過關！');
        });
    </script>
</body>
</html>
